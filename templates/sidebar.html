<!-- Overlay untuk Mobile -->
<div
    id="sidebarOverlay"
    class="fixed inset-0 z-30 hidden bg-slate-900/45 backdrop-blur-sm lg:hidden"
></div>

<!-- Sidebar -->
<aside
    id="sidebar"
    class="fixed inset-y-0 left-0 z-40 w-64 -translate-x-full transform bg-white border-r border-slate-200 flex flex-col transition duration-200 lg:static lg:translate-x-0"
>
    <div class="p-6 flex justify-between items-center border-b border-slate-100">
        <div>
            <h1 class="text-xl font-bold text-slate-900 tracking-tight">PT SLU Tools</h1>
            <p class="text-xs text-slate-500 font-medium mt-1">Warehouse Management</p>
        </div>
    </div>
    
    <nav class="flex-1 px-4 space-y-1 py-4 overflow-y-auto">
        {% for item in sidebar_items %}
            <a
            href="{{ url_for(item.endpoint) }}"
            class="flex items-center px-3 py-2.5 text-sm font-medium rounded-lg transition-colors {% if active_page == item.key %}text-blue-700 bg-blue-50{% else %}text-slate-600 hover:bg-slate-50{% endif %}"
            >
            <svg class="w-5 h-5 mr-3 {% if active_page == item.key %}text-blue-600{% else %}text-slate-400{% endif %}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                {% if item.key == 'dashboard' %}
                <!-- Home Icon -->
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                {% elif item.key == 'awb' %}
                <!-- Upload AWB Cloud Icon -->
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                {% elif item.key == 'label' %}
                <!-- Tag Icon -->
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
                {% elif item.key == 'resi' %}
                <!-- Document Icon -->
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                {% elif item.key == 'api_settings' %}
                <!-- Key Icon -->
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
                {% else %}
                <!-- Default Icon -->
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                {% endif %}
            </svg>
            {{ item.label }}
            </a>
        {% endfor %}
    </nav>
    
    <div class="p-4 border-t border-slate-200">
        <a href="#" class="flex items-center px-3 py-2.5 text-sm font-medium text-slate-600 rounded-lg hover:bg-slate-50 transition-colors">
            <svg class="w-5 h-5 mr-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            Logout
        </a>
    </div>
</aside>
